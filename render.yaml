services:
  - type: web
    name: dermai
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.address 0.0.0.0 --server.port $PORT --server.headless true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.9
      - key: DERMAI_CHECKPOINT_PATH
        value: outputs/efficientnet_b0/best.pt
